<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Na COCO POS 🌴</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f4f7f4; overflow: hidden; }
        .menu-card { transition: all 0.2s; background: white; cursor: pointer; border-radius: 25px; border: 1px solid #f0f0f0; }
        .menu-card:active { transform: scale(0.95); background-color: #f0fdf4; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .category-header { grid-column: 1 / -1; margin-top: 1.5rem; border-left: 4px solid #166534; padding-left: 0.75rem; margin-bottom: 0.5rem; }
        @media print { 
            .print-hidden { display: none !important; } 
            #receipt-area { width: 100% !important; position: absolute; top: 0; left: 0; border: none !important; box-shadow: none !important; } 
            body { overflow: visible; background: white; }
            .flex { display: block; }
            #receipt-logo { display: block !important; margin: 0 auto 10px auto !important; width: 80px !important; }
        }
        .discount-unit-btn { padding: 2px 8px; font-size: 10px; font-weight: bold; border-radius: 8px; border: 1px solid #e5e7eb; background: white; color: #9ca3af; }
        .discount-unit-btn.active { background: #ef4444; color: white; border-color: #ef4444; }
    </style>
</head>
<body class="text-gray-800">

    <div id="admin-modal" class="modal">
        <div class="bg-white rounded-[30px] w-full max-w-md p-6 shadow-2xl m-4">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold text-green-800"><i class="fas fa-cog"></i> ตั้งค่าระบบ</h2>
                <button onclick="closeAdmin()" class="text-2xl text-gray-400">&times;</button>
            </div>
            <div class="space-y-4 max-h-[60vh] overflow-y-auto pr-2">
                
                <div class="bg-blue-50/50 p-4 rounded-2xl border border-blue-100">
                    <label class="text-[10px] font-bold text-blue-400 uppercase block mb-2 text-center">เปลี่ยนโลโก้ร้าน (สำหรับหน้าจอและใบเสร็จ)</label>
                    <div class="flex flex-col items-center gap-3">
                        <img id="admin-logo-preview" src="https://i.ibb.co/LzfNqfX/image-1aad44.png" class="w-20 h-20 object-contain border-2 border-white rounded-xl shadow-sm bg-white">
                        <input type="file" id="logo-file" accept="image/*" class="hidden" onchange="handleLogoUpload(this)">
                        <button type="button" onclick="document.getElementById('logo-file').click();" class="w-full py-3 bg-blue-600 text-white rounded-xl font-bold text-sm shadow-md active:bg-blue-700">
                            <i class="fas fa-image mr-2"></i> เลือกรูปใหม่จากเครื่อง
                        </button>
                    </div>
                </div>

                <div>
                    <label class="text-xs font-bold text-gray-400 uppercase">เบอร์ PromptPay</label>
                    <input type="text" id="pp-input" class="w-full p-3 bg-gray-50 rounded-xl border font-bold text-lg text-green-700" placeholder="099-xxxxxxx">
                </div>

                <div id="admin-menu-list" class="space-y-2 pt-2 border-t"></div>
                <button onclick="addNewMenuItem()" class="w-full py-2 border-2 border-dashed border-blue-300 rounded-xl text-blue-500 font-bold text-sm">+ เพิ่มรายการใหม่</button>
            </div>
            <button onclick="saveSettings()" class="w-full bg-green-600 text-white py-4 rounded-2xl font-bold mt-6 shadow-lg">บันทึกทั้งหมด</button>
        </div>
    </div>

    <div class="flex h-screen">
        <div class="w-2/3 p-6 overflow-y-auto print-hidden">
            <div class="flex justify-between items-center mb-6">
                <div class="flex items-center gap-4">
                    <img id="main-logo" src="https://i.ibb.co/LzfNqfX/image-1aad44.png" class="w-16 h-16 object-contain rounded-xl">
                    <div>
                        <h1 class="text-xl font-black text-green-900 leading-none">ณ COCO</h1>
                        <p class="text-[10px] text-gray-400 font-bold tracking-widest uppercase">Integrated Farm System</p>
                    </div>
                </div>
                <div class="flex gap-2 text-xs">
                    <button onclick="resetQueue()" class="p-3 bg-white border rounded-full text-orange-400 shadow-sm"><i class="fas fa-sync-alt"></i></button>
                    <button onclick="openAdmin()" class="p-3 bg-white border rounded-full text-gray-400 shadow-sm"><i class="fas fa-cog"></i></button>
                    <div class="bg-orange-100 px-4 py-1 rounded-2xl text-center border border-orange-200">
                        <span class="text-[9px] block font-bold text-orange-500 uppercase leading-none">Queue</span>
                        <span id="next-q" class="text-xl font-black text-orange-600">#01</span>
                    </div>
                </div>
            </div>
            <div id="menu-sections" class="grid grid-cols-2 lg:grid-cols-3 gap-4"></div>
        </div>

        <div id="receipt-area" class="w-1/3 bg-white shadow-2xl flex flex-col border-l">
            <div class="p-6 text-center border-b border-dashed">
                <img id="receipt-logo" src="https://i.ibb.co/LzfNqfX/image-1aad44.png" class="w-16 h-16 object-contain mx-auto mb-2">
                <h2 class="font-black text-green-800 text-[10px] uppercase">RECEIPT / ใบเสร็จ</h2>
                <div id="receipt-q" class="text-5xl font-black text-green-900 my-1">#01</div>
                <p id="cur-date" class="text-[9px] text-gray-400 italic">--/--/-- --:--</p>
            </div>
            <div id="cart-list" class="flex-grow p-4 overflow-y-auto space-y-2 bg-gray-50/30"></div>
            <div class="p-6 border-t bg-white space-y-3">
                <div id="qr-area" class="hidden text-center p-2 bg-green-50 rounded-2xl border-2 border-dashed border-green-200">
                    <img id="qr-img" src="" class="w-28 h-28 mx-auto rounded-lg">
                </div>
                <div class="space-y-1">
                    <div class="flex justify-between text-gray-400 font-bold text-[10px] uppercase px-2">
                        <span>SUBTOTAL</span>
                        <span><span id="sub-total">0</span>.-</span>
                    </div>
                    <div class="flex justify-between items-center px-2 py-1 bg-red-50/50 rounded-xl border border-red-100 print-hidden">
                        <span class="text-red-500 font-bold text-[10px] uppercase">DISCOUNT</span>
                        <div class="flex items-center gap-1">
                            <input type="number" id="discount-val" oninput="updateCart()" class="w-12 bg-transparent text-right font-black text-red-600 outline-none" placeholder="0">
                            <button id="unit-baht" onclick="setUnit('฿')" class="discount-unit-btn active">฿</button>
                            <button id="unit-percent" onclick="setUnit('%')" class="discount-unit-btn">%</button>
                        </div>
                    </div>
                    <div id="row-discount" class="hidden justify-between text-red-500 font-bold text-[10px] uppercase px-2">
                        <span>ส่วนลด (<span id="txt-dis-label">0</span>)</span>
                        <span>-<span id="txt-dis-amount">0</span>.-</span>
                    </div>
                    <div class="flex justify-between items-end px-2 pt-1">
                        <span class="text-gray-400 font-bold uppercase text-[10px]">TOTAL</span>
                        <span class="text-4xl font-black text-green-700"><span id="total-price">0</span>.-</span>
                    </div>
                </div>
                <div class="print-hidden">
                    <input type="number" id="cash-in" oninput="calculateChange()" class="w-full p-4 bg-gray-50 border-2 border-transparent rounded-2xl text-right font-black text-2xl outline-none focus:border-green-300" placeholder="รับเงินสด...">
                </div>
                <div id="change-box" class="hidden flex justify-between items-center px-3 py-2 bg-orange-50 rounded-xl border border-orange-100">
                    <span class="text-orange-500 font-bold text-xs uppercase">เงินทอน</span>
                    <span class="text-xl font-black text-orange-600"><span id="change-amount">0</span>.-</span>
                </div>
                <div class="flex gap-2 print-hidden">
                    <button onclick="clearCart()" class="p-4 bg-gray-100 text-gray-400 rounded-2xl"><i class="fas fa-trash"></i></button>
                    <button id="btn-pay" onclick="handleCheckout()" class="flex-grow bg-green-600 text-white py-4 rounded-2xl font-black text-lg shadow-xl active:scale-95">บันทึก & พิมพ์</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbzaqzCpf-75DJlsrou4FTtPntrq5IcxatinAp2Nutwdt62RWpDDN6sap2-nvFWq8TNm/exec';
        let menuItems = JSON.parse(localStorage.getItem('na_coco_menu')) || [
            { name: 'น้ำมะพร้าวสด', price: 35, icon: '🥤', category: 'น้ำมะพร้าว' },
            { name: 'อเมริกาโน่', price: 40, icon: '☕', category: 'กาแฟ' }
        ];
        let cart = [];
        let q = parseInt(localStorage.getItem('na_coco_q')) || 1;
        let discountUnit = '฿';
        let tempLogoData = ""; 

        function init() { 
            const savedLogo = localStorage.getItem('na_coco_logo');
            if(savedLogo) {
                document.getElementById('main-logo').src = savedLogo;
                document.getElementById('receipt-logo').src = savedLogo;
            }
            renderApp(); 
            updateCart(); 
        }

        function handleLogoUpload(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    tempLogoData = e.target.result;
                    document.getElementById('admin-logo-preview').src = tempLogoData;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function setUnit(u) {
            discountUnit = u;
            document.getElementById('unit-baht').classList.toggle('active', u === '฿');
            document.getElementById('unit-percent').classList.toggle('active', u === '%');
            updateCart();
        }

        function renderApp() {
            document.getElementById('next-q').innerText = '#' + q.toString().padStart(2, '0');
            document.getElementById('receipt-q').innerText = '#' + q.toString().padStart(2, '0');
            const menuDiv = document.getElementById('menu-sections');
            menuDiv.innerHTML = "";
            const categories = [...new Set(menuItems.map(item => item.category || 'ทั่วไป'))];
            categories.forEach(cat => {
                const header = document.createElement('div');
                header.className = "category-header";
                header.innerHTML = `<h3 class="font-black text-green-800 text-sm uppercase">${cat}</h3>`;
                menuDiv.appendChild(header);
                menuItems.filter(item => (item.category || 'ทั่วไป') === cat).forEach(item => {
                    const card = document.createElement('div');
                    card.className = "menu-card p-6 flex flex-col items-center shadow-sm";
                    card.onclick = () => addToCart(item.name, item.price);
                    card.innerHTML = `<span class="text-4xl mb-2">${item.icon}</span><span class="font-bold text-[10px] text-gray-500 text-center uppercase">${item.name}</span><span class="text-green-600 font-black">${item.price}.-</span>`;
                    menuDiv.appendChild(card);
                });
            });
        }

        function addToCart(name, price) {
            const found = cart.find(i => i.name === name);
            if(found) found.qty++; else cart.push({name, price, qty: 1});
            updateCart();
        }

        function updateCart() {
            const list = document.getElementById('cart-list');
            let subtotal = 0;
            list.innerHTML = cart.map((item, idx) => {
                subtotal += (item.price * item.qty);
                return `<div class="flex justify-between items-center bg-white p-3 rounded-xl border border-gray-100 text-xs font-bold">
                    <span>${item.name} x ${item.qty}</span>
                    <div class="flex items-center gap-3"><span class="text-green-600">${(item.price * item.qty).toLocaleString()}.-</span><button onclick="cart.splice(${idx},1); updateCart();" class="text-red-200">×</button></div>
                </div>`;
            }).join('');
            const disVal = parseFloat(document.getElementById('discount-val').value) || 0;
            let disAmount = (discountUnit === '%') ? (subtotal * disVal / 100) : disVal;
            const finalTotal = Math.max(0, subtotal - disAmount);
            document.getElementById('sub-total').innerText = subtotal.toLocaleString();
            document.getElementById('txt-dis-label').innerText = disVal + discountUnit;
            document.getElementById('txt-dis-amount').innerText = Math.round(disAmount).toLocaleString();
            document.getElementById('total-price').innerText = Math.round(finalTotal).toLocaleString();
            document.getElementById('row-discount').style.display = disVal > 0 ? 'flex' : 'none';
            updateQR(finalTotal);
            calculateChange();
        }

        function calculateChange() {
            const total = parseInt(document.getElementById('total-price').innerText.replace(/,/g, '')) || 0;
            const cash = parseInt(document.getElementById('cash-in').value) || 0;
            const changeBox = document.getElementById('change-box');
            if (cash >= total && total > 0) {
                changeBox.classList.remove('hidden');
                document.getElementById('change-amount').innerText = (cash - total).toLocaleString();
            } else { changeBox.classList.add('hidden'); }
        }

        function updateQR(total) {
            const pp = localStorage.getItem('na_coco_pp');
            const qrArea = document.getElementById('qr-area');
            if (pp && total > 0) {
                qrArea.classList.remove('hidden');
                document.getElementById('qr-img').src = `https://promptpay.io/${pp}/${total}.png`;
            } else { qrArea.classList.add('hidden'); }
        }

        async function handleCheckout() {
            if(cart.length === 0) return;
            const btn = document.getElementById('btn-pay');
            btn.disabled = true; btn.innerText = 'SAVING...';
            const timeStr = new Date().toLocaleString('th-TH');
            try {
                window.print();
                await fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ timestamp: timeStr, items: cart.map(i => `${i.name}(${i.qty})`).join(', '), amount: document.getElementById('total-price').innerText })});
                q++; localStorage.setItem('na_coco_q', q);
                clearCart(); renderApp();
            } catch (e) { console.error(e); } finally { btn.disabled = false; btn.innerText = 'บันทึก & พิมพ์'; }
        }

        function clearCart() { cart = []; document.getElementById('cash-in').value = ''; document.getElementById('discount-val').value = ''; updateCart(); }
        
        function openAdmin() { 
            document.getElementById('admin-modal').style.display = 'flex'; 
            document.getElementById('pp-input').value = localStorage.getItem('na_coco_pp') || ''; 
            const savedLogo = localStorage.getItem('na_coco_logo') || "https://i.ibb.co/LzfNqfX/image-1aad44.png";
            document.getElementById('admin-logo-preview').src = savedLogo;
            tempLogoData = savedLogo;
            renderAdminMenu(); 
        }
        
        function closeAdmin() { document.getElementById('admin-modal').style.display = 'none'; }
        
        function renderAdminMenu() {
            const list = document.getElementById('admin-menu-list');
            list.innerHTML = menuItems.map((item, idx) => `
                <div class="bg-gray-50 p-2 rounded-lg mb-2 border flex flex-col gap-1 text-xs">
                    <div class="flex gap-1">
                        <input type="text" value="${item.icon}" onchange="menuItems[${idx}].icon=this.value" class="w-8 border rounded text-center">
                        <input type="text" value="${item.name}" onchange="menuItems[${idx}].name=this.value" class="flex-grow border rounded px-1">
                        <input type="number" value="${item.price}" onchange="menuItems[${idx}].price=Number(this.value)" class="w-12 border rounded text-right">
                        <button onclick="menuItems.splice(${idx},1); renderAdminMenu();" class="text-red-500 px-1 font-bold">×</button>
                    </div>
                    <input type="text" value="${item.category || ''}" onchange="menuItems[${idx}].category=this.value" class="w-full border rounded px-1" placeholder="ระบุหมวดหมู่">
                </div>
            `).join('');
        }

        function addNewMenuItem() { menuItems.push({ name: 'เมนูใหม่', price: 0, icon: '🥥', category: 'ทั่วไป' }); renderAdminMenu(); }

        function saveSettings() { 
            localStorage.setItem('na_coco_pp', document.getElementById('pp-input').value); 
            if(tempLogoData) {
                localStorage.setItem('na_coco_logo', tempLogoData);
                document.getElementById('main-logo').src = tempLogoData;
                document.getElementById('receipt-logo').src = tempLogoData;
            }
            localStorage.setItem('na_coco_menu', JSON.stringify(menuItems)); 
            renderApp(); closeAdmin(); 
        }

        function resetQueue() { if (confirm("เริ่มคิวใหม่ #01?")) { q = 1; localStorage.setItem('na_coco_q', q); renderApp(); } }
        init();
    </script>
</body>
</html>
